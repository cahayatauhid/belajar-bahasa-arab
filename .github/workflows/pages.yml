name: Deploy slides ke GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'slides/**'
      - 'textbook/level-*.pdf'
      - 'workbook/level-*.pdf'
      - 'docs/*.pdf'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble Pages content
        run: |
          mkdir -p _pages_site
          cp -r slides/* _pages_site/
          mkdir -p _pages_site/buku _pages_site/docs
          if [ -f textbook/level-1.pdf ]; then
            cp textbook/level-1.pdf _pages_site/buku/level-1.pdf
          fi
          if [ -f docs/desain-kurikulum.pdf ]; then
            cp docs/desain-kurikulum.pdf _pages_site/docs/desain-kurikulum.pdf
          fi
          if [ -f docs/silabus.pdf ]; then
            cp docs/silabus.pdf _pages_site/docs/silabus.pdf
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
